<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo app</title>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>
    <div class="app"> 
    <h2>ToDo app</h2>
    <input type="text" id="todo-input" onkeyup="validate()" class="textbox" placeholder="Enter task">
    <input type="datetime-local" min="" id="todo-date" class="textbox" onkeydown="validatetime()"  placeholder="Enter Date">
    <label>choose the priority of your task</label>
    <select name="priority" id="priority" class="priority">
        <option value="High">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>
    <div class="error" id="error">task is mandatory</div>
    <button onclick="addTodo()" class="add-button">Add</button>
    <button onclick="sort()" class="sort-by-alphabets">Sort</button>
    
    <ul id="todo-list"></ul>
    </div>
</body>
<script src="script.js"></script>
<script src="async.js"></script>
</html>
